<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.1/moment-timezone-with-data-1970-2030.min.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <title>World Clock</title>
  </head>
  <body>
    <div class="container">
    <h1>World Clocks</h1>
    <select name="" id="city">
        <option value="">Select a city...</option>
        <option value="current">My current location</option>
        <option value="Asia/Seoul">Seoul</option>
        <option value="Asia/Saigon">Saigon</option>
        <option value="Africa/Lagos">Lagos</option>
    </select>
    
    <div id="cities">
    <div class="city" id="los-angeles">
        <div>
        <h2>Los Angeles</h2>
        <div class="date"></div>
        </div>
        <div class="time"></div>
    </div>
    <div class="city" id="new-york">
        <div>
        <h2>New York</h2>
        <div class="date"></div>
        </div>
        <div class="time"></div>
    </div>
    </div>
    </div>
  </body>
    <footer>
      This project was coded by
      <a href="https://github.com/cocopuff79"> Nicole Williams</a>, open-sourced
      on <a href="https://github.com/cocopuff79/world-clock">Github</a> and
      deployed on
      <a href="https://world-clock-shecodes-plus.netlify.app/">Netlify</a> as I
      continue leveling up in tech.
    </footer>
    <script src="src/index.js"></script>
  </body>
</html>
