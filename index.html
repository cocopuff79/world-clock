  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>World Clock</title>
  </head>
  <body>
    <div class="container">
    <h1>World Clocks</h1>
    <select name="" id="">
        <option value="">Select a city...</option>
        <option value="">Miami</option>
        <option value="">Danville</option>
        <option value="">Sydney</option>
        <option value="">Lagos</option>
    </select>
    
    <div class="city">
        <div>
        <h2>Vallejo</h2>
        <div class="date">July 8, 2026</div>
        </div>
        <div class="time">8:01:58 <small>AM</small></div>
    </div>
    <div class="city">
        <div>
        <h2>Memphis</h2>
        <div class="date">July 8, 2026</div>
        </div>
        <div class="time">10:01:58 <small>AM</small></div>
    </div>
    </div>
  </body>
